name: Deploy to VPS

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.repository }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Sync source to VPS
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: ".,!node_modules,!.git,!.next,!.env.local"
          target: /var/www/ubiregi-app
          rm: false

      - name: Build & Restart on VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /var/www/ubiregi-app
            if [ -d .next ]; then
              rm -rf .next.bak
              cp -r .next .next.bak
            fi
            npm ci
            if ! npm run build; then
              echo "[BUILD FAILED] rolling back .next"
              rm -rf .next
              [ -d .next.bak ] && mv .next.bak .next
              exit 1
            fi
            rm -rf .next.bak
            pm2 restart ubiregi-app --max-memory-restart 300M || pm2 start npm --name ubiregi-app --max-memory-restart 300M -- start
            echo "✓ ubiregi-app deployed"
