name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Build on CI runner
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          npm ci
          npm run build

      - name: Stop app before deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: pm2 stop ubiregi-app || true

      - name: Sync built artifacts to VPS
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: ".next,public,package.json,package-lock.json,next.config.ts"
          target: /var/www/ubiregi-app
          rm: false

      - name: Install prod deps & Restart on VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /var/www/ubiregi-app
            npm ci --omit=dev
            pm2 restart ubiregi-app || pm2 start npm --name ubiregi-app -- start
            # Wait for app ready, then warmup dynamic routes
            for i in $(seq 1 15); do
              curl -sf http://localhost:3001/u > /dev/null 2>&1 && break
              sleep 2
            done
            curl -sf http://localhost:3001/u/sales > /dev/null 2>&1 || true
            curl -sf http://localhost:3001/u/items > /dev/null 2>&1 || true
            echo "✓ ubiregi-app deployed"

      - name: Update SYSTEM.md on VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            curl -fsSL "https://raw.githubusercontent.com/masacikun/smile-mgmt/main/SYSTEM.md" \
              -o /var/www/SYSTEM.md
            echo "✓ /var/www/SYSTEM.md を更新しました"
