name: Deploy to VPS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Build on CI runner
        run: |
          npm ci
          npm run build

      - name: Sync built artifacts to VPS
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: ".next,public,package.json,package-lock.json,next.config.ts"
          target: /var/www/ubiregi-app
          rm: false

      - name: Install prod deps & Restart on VPS
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /var/www/ubiregi-app
            npm ci --omit=dev
            pm2 restart ubiregi-app || pm2 start npm --name ubiregi-app -- start
            echo "✓ ubiregi-app deployed"
